{% extends "base.html" %}

{% block title %}SBR Leads — Busca de Leads{% endblock %}

{% block content %}
<div class="space-y-4">

  <!-- ========= FILTROS STICKY ========= -->
  <div class="sticky top-[53px] z-20 -mx-5 px-5 py-3 bg-[#111] border-b border-[#2a2a2a] shadow-[0_4px_24px_rgba(0,0,0,0.6)]">
    <form id="filtros"
          hx-post="/buscar"
          hx-target="#resultado"
          hx-swap="innerHTML show:#resultado:top"
          hx-indicator="#spinner">

      <!-- Linha 1 — filtros principais -->
      <div class="flex flex-wrap items-center gap-2.5">

        <!-- Segmento -->
        <div class="flex-1 min-w-[160px]">
          <label class="block text-[10px] font-semibold text-[#666] mb-1 uppercase tracking-wider">Segmento</label>
          <select name="segmento"
                  class="w-full rounded-lg bg-[#1a1a1a] border border-[#333] px-2.5 py-1.5 text-sm text-[#e5e5e5] focus:outline-none focus:border-orange-500 transition-colors">
            <option value="">Todos os segmentos</option>
            {% for atalho in atalhos %}
            <option value="{{ atalho.segmento }}">{{ atalho.descricao }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- Estado -->
        <div class="min-w-[110px]">
          <label class="block text-[10px] font-semibold text-[#666] mb-1 uppercase tracking-wider">Estado</label>
          <select name="uf" id="sel-uf"
                  class="w-full rounded-lg bg-[#1a1a1a] border border-[#333] px-2.5 py-1.5 text-sm text-[#e5e5e5] focus:outline-none focus:border-orange-500 transition-colors"
                  hx-get="/municipios-options"
                  hx-target="#sel-municipio"
                  hx-trigger="change"
                  hx-include="[name='uf']">
            <option value="">Todos</option>
            {% for uf in ufs %}
            <option value="{{ uf.sigla }}">{{ uf.sigla }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- Município -->
        <div class="flex-1 min-w-[160px]">
          <label class="block text-[10px] font-semibold text-[#666] mb-1 uppercase tracking-wider">Município</label>
          <select name="municipio_codigo" id="sel-municipio"
                  class="w-full rounded-lg bg-[#1a1a1a] border border-[#333] px-2.5 py-1.5 text-sm text-[#e5e5e5] focus:outline-none focus:border-orange-500 transition-colors">
            <option value="">Todos os municípios</option>
          </select>
        </div>

        <!-- Porte -->
        <div class="min-w-[100px]">
          <label class="block text-[10px] font-semibold text-[#666] mb-1 uppercase tracking-wider">Porte</label>
          <select name="porte"
                  class="w-full rounded-lg bg-[#1a1a1a] border border-[#333] px-2.5 py-1.5 text-sm text-[#e5e5e5] focus:outline-none focus:border-orange-500 transition-colors">
            <option value="">Todos</option>
            <option value="01">MEI</option>
            <option value="03">ME</option>
            <option value="05">EPP</option>
            <option value="99">Demais</option>
          </select>
        </div>

        <!-- Status do cliente -->
        <div class="min-w-[120px]">
          <label class="block text-[10px] font-semibold text-[#666] mb-1 uppercase tracking-wider">Status</label>
          <select name="status_cliente"
                  class="w-full rounded-lg bg-[#1a1a1a] border border-[#333] px-2.5 py-1.5 text-sm text-[#e5e5e5] focus:outline-none focus:border-orange-500 transition-colors">
            <option value="">Todos</option>
            <option value="cliente">Clientes</option>
            <option value="prospect">Prospectos</option>
          </select>
        </div>

        <!-- Apenas ativas + Buscar -->
        <div class="flex items-center gap-3 flex-shrink-0 ml-auto">
          <label class="flex items-center gap-1.5 cursor-pointer">
            <input type="checkbox" name="apenas_ativas" value="true" checked
                   class="rounded border-[#3a3a3a] bg-[#222] accent-orange-500" />
            <span class="text-sm text-[#888] whitespace-nowrap">Apenas ativas</span>
          </label>
          <button type="submit"
                  class="bg-orange-500 hover:bg-orange-600 text-white font-semibold px-4 py-1.5 rounded-lg transition-colors flex items-center gap-2 whitespace-nowrap text-sm">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            Buscar
            <svg id="spinner" class="htmx-indicator animate-spin w-3.5 h-3.5" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
          </button>
        </div>

      </div>

      <!-- Linha 2 — filtro por produto -->
      <div class="flex items-center gap-3 mt-2.5 pt-2.5 border-t border-[#1e1e1e]">

        <!-- Combobox de produto -->
        <div class="relative flex-shrink-0 w-72" id="div-produto">
          <label class="block text-[10px] font-semibold text-[#666] mb-1 uppercase tracking-wider">Produto comprado</label>
          <div class="relative flex items-center">
            <svg class="absolute left-2.5 w-3.5 h-3.5 text-[#555] pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <input type="text" id="produto-busca" name="q"
                   placeholder="Buscar produto..."
                   autocomplete="off"
                   hx-get="/produtos-options"
                   hx-target="#produto-dropdown"
                   hx-trigger="input changed delay:250ms"
                   class="w-full pl-8 pr-8 rounded-lg bg-[#1a1a1a] border border-[#333] py-1.5 text-sm text-[#e5e5e5] focus:outline-none focus:border-orange-500 transition-colors" />
            <button type="button" id="btn-menu-produto"
                    onclick="toggleMenuProdutos()"
                    title="Abrir menu de seleção"
                    class="absolute right-2 text-[#555] hover:text-[#aaa] transition-colors">
              <svg id="ico-menu-produto" class="w-3.5 h-3.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
            </button>
          </div>
          <!-- Dropdown (posicionado abaixo do input, acima do restante da página) -->
          <div id="produto-dropdown"
               class="hidden absolute top-full left-0 right-0 z-50 mt-1 bg-[#161616] border border-[#333] rounded-xl shadow-2xl p-1 max-h-56 overflow-y-auto">
          </div>
        </div>

        <!-- Chips dos produtos selecionados -->
        <div class="flex-1 flex flex-wrap gap-1.5 items-center min-h-[34px]">
          <span id="produtos-placeholder" class="text-xs text-[#3a3a3a] select-none">Todos os produtos</span>
        </div>

        <input type="hidden" name="produtos_codigos" id="produtos-codigos-hidden" value="" />
      </div>

    </form>
  </div>

  <!-- ========= RESULTADOS ========= -->
  <div id="resultado">
    <div class="bg-[#171717] rounded-xl border border-[#2e2e2e] p-12 text-center text-[#555]">
      <svg class="w-12 h-12 mx-auto mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <p class="font-medium text-[#666]">Selecione os filtros e clique em Buscar</p>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
function exportar(formato) {
  const form = document.getElementById('filtros');
  const fd = new FormData(form);
  fetch(`/exportar.${formato}`, { method: 'POST', body: fd })
    .then(r => r.blob())
    .then(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `sbr-leads.${formato}`;
      a.click();
      URL.revokeObjectURL(url);
    });
}

// ---- Filtro de produto ----
const _produtosSelecionados = {};
let _menuAberto = false;

function _esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function _abrirDropdown() {
  const dd = document.getElementById('produto-dropdown');
  const ico = document.getElementById('ico-menu-produto');
  if (!dd) return;
  dd.classList.remove('hidden');
  if (ico) ico.style.transform = 'rotate(180deg)';
  _menuAberto = true;
}

function _fecharDropdown() {
  const dd = document.getElementById('produto-dropdown');
  const ico = document.getElementById('ico-menu-produto');
  if (!dd) return;
  dd.classList.add('hidden');
  if (ico) ico.style.transform = '';
  _menuAberto = false;
}

// Abre o menu e carrega os produtos mais pedidos
window.toggleMenuProdutos = function() {
  if (_menuAberto) { _fecharDropdown(); return; }
  const dd = document.getElementById('produto-dropdown');
  if (!dd) return;
  const inp = document.getElementById('produto-busca');
  if (inp) inp.value = '';
  htmx.ajax('GET', '/produtos-options', { target: '#produto-dropdown', swap: 'innerHTML' });
  _abrirDropdown();
  _atualizarChecks();
};

window.selecionarProduto = function(codigo, descricao) {
  if (_produtosSelecionados[codigo]) {
    delete _produtosSelecionados[codigo];
  } else {
    _produtosSelecionados[codigo] = descricao;
  }
  _renderProdutos();
  _atualizarChecks();
};

window.removerProduto = function(codigo) {
  delete _produtosSelecionados[codigo];
  _renderProdutos();
  _atualizarChecks();
};

// Marca visualmente os itens já selecionados no dropdown
function _atualizarChecks() {
  document.querySelectorAll('#produto-dropdown .produto-option').forEach(btn => {
    const cod = btn.dataset.codigo;
    const selecionado = !!_produtosSelecionados[cod];
    const check = btn.querySelector('.produto-check');
    if (check) check.style.opacity = selecionado ? '1' : '0';
    btn.classList.toggle('bg-orange-500/10', selecionado);
    btn.classList.toggle('text-orange-400', selecionado);
  });
}

function _renderProdutos() {
  const placeholder = document.getElementById('produtos-placeholder');
  const hidden = document.getElementById('produtos-codigos-hidden');
  const container = placeholder?.parentElement;
  if (!container) return;

  const entries = Object.entries(_produtosSelecionados);
  // Remove chips existentes (mantém o placeholder)
  container.querySelectorAll('.produto-chip').forEach(el => el.remove());

  if (entries.length === 0) {
    if (placeholder) placeholder.style.display = '';
  } else {
    if (placeholder) placeholder.style.display = 'none';
    entries.forEach(([cod, desc]) => {
      const label = desc.length > 30 ? desc.slice(0, 30) + '…' : desc;
      const safeCod = cod.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      const chip = document.createElement('span');
      chip.className = 'produto-chip inline-flex items-center gap-1 text-[10px] px-2.5 py-1 rounded-full bg-orange-500/15 text-orange-400 border border-orange-500/25 font-medium';
      chip.innerHTML = `${_esc(label)}<button type="button" onclick="removerProduto('${safeCod}')" class="ml-1 text-orange-400/50 hover:text-orange-300 leading-none font-bold text-xs">×</button>`;
      container.insertBefore(chip, placeholder);
    });
  }

  hidden.value = Object.keys(_produtosSelecionados).join(',');
}

// Após HTMX carregar o dropdown, aplica os estados de seleção
document.addEventListener('htmx:afterSettle', function(e) {
  if (e.detail.target && e.detail.target.id === 'produto-dropdown') {
    _abrirDropdown();
    _atualizarChecks();
  }
});

// Abre o menu ao focar o input (sem valor)
document.addEventListener('DOMContentLoaded', function() {
  const inp = document.getElementById('produto-busca');
  if (!inp) return;
  inp.addEventListener('focus', function() {
    if (!_menuAberto) {
      htmx.ajax('GET', '/produtos-options', { target: '#produto-dropdown', swap: 'innerHTML' });
    }
  });
});

// Fechar ao clicar fora
document.addEventListener('click', function(e) {
  const dd = document.getElementById('produto-dropdown');
  const wrapper = document.getElementById('div-produto');
  if (dd && wrapper && !wrapper.contains(e.target)) {
    _fecharDropdown();
  }
});
</script>
{% endblock %}
