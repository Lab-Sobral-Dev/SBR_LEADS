{% extends "base.html" %}
{% block title %}SBR Leads — Recompra{% endblock %}

{% block content %}
<div class="space-y-4">
  <div>
    <h1 class="text-xl font-semibold text-white">Recompra</h1>
    <p class="text-sm text-[#888]">Quem está dentro ou fora do próprio ritmo de compra (medição até hoje).</p>
  </div>

  <!-- Filtros: o FORM dispara no change de qualquer select e envia todos os campos juntos -->
  <form hx-get="/dashboard/recompra" hx-target="#recompra-paineis" hx-swap="innerHTML"
        hx-trigger="change" hx-push-url="true"
        class="bg-[#171717] rounded-xl border border-[#2e2e2e] p-4 flex flex-wrap gap-3 items-end">
    <label class="text-xs text-[#888]">Vendedor
      <select name="vendedor"
              class="block mt-1 bg-[#222] border border-[#3a3a3a] rounded-lg px-3 py-2 text-sm text-[#ddd]">
        <option value="">Todos</option>
        {% for v in opcoes.vendedores %}
        <option value="{{ v }}" {{ 'selected' if filtros.vendedor == v else '' }}>{{ v }}</option>
        {% endfor %}
      </select>
    </label>
    <label class="text-xs text-[#888]">UF
      <select name="uf"
              class="block mt-1 bg-[#222] border border-[#3a3a3a] rounded-lg px-3 py-2 text-sm text-[#ddd]">
        <option value="">Todas</option>
        {% for u in opcoes.ufs %}
        <option value="{{ u }}" {{ 'selected' if filtros.uf == u else '' }}>{{ u }}</option>
        {% endfor %}
      </select>
    </label>
    <label class="text-xs text-[#888]">Cidade
      <select name="cidade"
              class="block mt-1 min-w-[160px] bg-[#222] border border-[#3a3a3a] rounded-lg px-3 py-2 text-sm text-[#ddd]">
        <option value="">Todas</option>
        {% for cid in opcoes.cidades %}
        <option value="{{ cid }}" {{ 'selected' if filtros.cidade == cid else '' }}>{{ cid }}</option>
        {% endfor %}
      </select>
    </label>
    <label class="text-xs text-[#888]">Faixa
      <select name="faixa"
              class="block mt-1 bg-[#222] border border-[#3a3a3a] rounded-lg px-3 py-2 text-sm text-[#ddd]">
        <option value="">Todas</option>
        {% for k in ['atrasado', 'atrasando', 'em_dia', 'sem_padrao'] %}
        <option value="{{ k }}" {{ 'selected' if filtros.faixa == k else '' }}>{{ faixas[k].emoji }} {{ faixas[k].label }}</option>
        {% endfor %}
      </select>
    </label>
  </form>

  <div id="recompra-paineis">
    {% include "partials/recompra_paineis.html" %}
  </div>
</div>
{% endblock %}
